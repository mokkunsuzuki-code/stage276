name: stage277-external-anchor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-anchor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenTimestamps client
        run: |
          python -m pip install --upgrade pip
          pip install opentimestamps-client

      - name: Create output directory
        run: mkdir -p out/stage277

      - name: Build summary and sha256
        run: |
          python tools/build_stage277_summary.py

      - name: Stamp summary with OpenTimestamps
        run: |
          ots stamp out/stage277/summary.json

      - name: Show generated files
        run: |
          ls -la out/stage277
          echo
          cat out/stage277/summary.sha256
          echo
          python -m json.tool out/stage277/summary.json

      - name: Upload stage277 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage277-external-anchor
          path: |
            out/stage277/summary.json
            out/stage277/summary.sha256
            out/stage277/summary.json.ots
